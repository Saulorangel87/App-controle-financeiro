services:
  backend:
    build: ./Backend
    container_name: despesas-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_REMETENTE=${EMAIL_REMETENTE}
      - PORT=3001
    volumes:
      # Persiste o banco SQLite fora do container, senão os dados somem
      # a cada rebuild da imagem.
      - ./Backend/data:/app/data
    ports:
      - "3011:3001"

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: despesas-frontend
    restart: unless-stopped
    ports:
      - "8091:80"
    depends_on:
      - backend
