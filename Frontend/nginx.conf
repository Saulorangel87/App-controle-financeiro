server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/javascript application/json
               image/svg+xml font/woff2 application/font-woff2;

    # Arquivos gerados pelo build do Vite têm hash no nome (ex: index-a1b2c3.js),
    # então podem ser cacheados "pra sempre" pelo navegador — se o conteúdo mudar,
    # o nome do arquivo muda junto.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Essencial pro React Router funcionar: qualquer rota que não seja um
    # arquivo real (ex: /despesas, /relatorio) cai de volta no index.html,
    # e o React Router decide o que mostrar no lado do cliente. Sem isso,
    # atualizar a página numa rota interna dá 404 no Nginx.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
